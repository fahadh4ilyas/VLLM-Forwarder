services:
  vllm-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vllm_proxy
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - WORKER_NUM=5
    network_mode: "host"
    # ports:
    #   - "5000:5000"
    volumes:
      # Database persistence
      - ${PWD}/proxy_db:/api/db
      # Log persistence
      - ${PWD}/proxy_logs:/api/logs
    restart: unless-stopped
